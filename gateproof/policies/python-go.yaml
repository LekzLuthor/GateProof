project:
  name: platform-monorepo
  profile: secure-release-python-go

required_scans:
  - SAST
  - SCA
  - SECRETS
  - CONTAINER

required_tools:
  - bandit
  - pip-audit
  - gosec
  - govulncheck
  - gitleaks
  - trivy

requirements:
  sbom_required: false
  evidence_bundle_required: true

thresholds:
  SAST:
    critical: 0
    high: 0
  SCA:
    critical: 0
    high: 0
  SECRETS:
    high: 0
  CONTAINER:
    critical: 0
    high: 0

decision:
  fail_on_missing_required_scan: true
  fail_on_missing_required_tool: true
  fail_on_policy_violation: true
