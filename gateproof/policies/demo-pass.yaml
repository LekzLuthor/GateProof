project:
  name: clean-python-app
  profile: demo-pass-baseline-tolerant

required_scans:
  - SAST
  - SCA
  - SECRETS
  - CONTAINER

requirements:
  sbom_required: false
  evidence_bundle_required: true

thresholds:
  SAST:
    critical: 0
    high: 0
  SCA:
    critical: 0
    high: 0
  SECRETS:
    high: 0
  CONTAINER:
    # Demo baseline tolerance for a reproducible PASS scenario.
    # This is not a production security policy.
    critical: 999
    high: 999

decision:
  fail_on_missing_required_scan: true
  fail_on_policy_violation: true
