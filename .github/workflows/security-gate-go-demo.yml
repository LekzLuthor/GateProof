name: Security Gate Go Demo

on:
  workflow_dispatch:

jobs:
  security-gate-go:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install GateProof and Python scanners
        working-directory: gateproof
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install bandit pip-audit

      - name: Install Go scanners
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          gosec -version || true
          govulncheck -version || true

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="$(
            curl -sSfL https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
              | python -c "import json, sys; print(json.load(sys.stdin)['tag_name'])"
          )"
          GITLEAKS_NUMBER="${GITLEAKS_VERSION#v}"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_NUMBER}_linux_x64.tar.gz" \
            -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.3.1

      - name: Build Go demo image
        run: |
          docker build \
            -t gateproof-go-demo:${{ github.sha }} \
            gateproof/examples/vulnerable-go-app

      - name: Run GateProof Python and Go scan
        working-directory: gateproof
        continue-on-error: true
        run: |
          gateproof scan \
            --config examples/gateproof-python-go.yaml \
            --policy policies/python-go.yaml \
            --image gateproof-go-demo:${{ github.sha }} \
            --commit "${{ github.sha }}"

      - name: Show gate decision
        run: cat gateproof/.gateproof/evidence/gate-decision.json

      - name: Upload GateProof evidence
        uses: actions/upload-artifact@v4
        with:
          name: gateproof-go-evidence
          path: gateproof/.gateproof/evidence
